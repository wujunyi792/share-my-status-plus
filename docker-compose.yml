name: share-my-status

x-env-file: &env_file
  - .env

services:
  # MySQL Database
  mysql:
    image: mysql:8.4.5
    container_name: share-my-status-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-share_my_status}
      MYSQL_USER: ${MYSQL_USER:-share_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-share123}
    env_file: *env_file
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - share-network

  # Redis Cache
  redis:
    image: redis:7.4-alpine
    container_name: share-my-status-redis
    restart: always
    env_file: *env_file
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - share-network

  # Share My Status Backend Application
  share-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: share-my-status-backend
    restart: always
    env_file: *env_file
    environment:
      - APP_ENV=production
      - HTTP_PORT=8080
      - DB_DSN=${MYSQL_USER:-share_user}:${MYSQL_PASSWORD:-share123}@tcp(mysql:3306)/${MYSQL_DATABASE:-share_my_status}?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_URL=redis://redis:6379
      - DEFAULT_TZ=${DEFAULT_TZ:-Asia/Shanghai}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - share-network



volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  share-network:
    driver: bridge
    name: share-my-status-network