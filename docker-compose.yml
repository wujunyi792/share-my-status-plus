name: share-my-status

x-env-file: &env_file
  - .env

services:
  # MySQL Database
  mysql:
    image: mysql:latest
    container_name: share-my-status-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-share_my_status}
      MYSQL_USER: ${MYSQL_USER:-share_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-share_password_change_me}
      MYSQL_CHARSET: utf8mb4
    env_file: *env_file
    ports:
      - "${MYSQL_PORT:-3306}:3306"  # 使用不同端口避免冲突
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - share-network

  # Redis Cache
  redis:
    image: redis:7.4-alpine
    container_name: share-my-status-redis
    restart: unless-stopped
    env_file: *env_file
    ports:
      - "${REDIS_PORT:-6379}:6379"  # 使用不同端口避免冲突
    volumes:
      - ./docker/data/redis:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_change_me}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - share-network

  share-backend:
    build:
      dockerfile: backend/Dockerfile
    container_name: share-my-status-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/.env:/app/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - share-network

  share-web:
    build:
      dockerfile: frontend/Dockerfile
    container_name: share-my-status-web
    restart: always
    ports:
      - "${WEB_LISTEN_PORT:-8888}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # Main nginx config
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro  # Proxy config
    depends_on:
      - share-backend
    networks:
      - share-network

networks:
  share-network:
    driver: bridge
    name: share-my-status-network