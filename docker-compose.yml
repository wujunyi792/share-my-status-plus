name: share-my-status

x-env-file: &env_file
  - .env

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: share-my-status-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-status-sharing}
      POSTGRES_USER: ${POSTGRES_USER:-status_sharing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_change_me}
    env_file: *env_file
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-status_sharing} -d ${POSTGRES_DB:-status-sharing}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - share-network

  # Redis Cache
  redis:
    image: redis:7.4-alpine
    container_name: share-my-status-redis
    restart: unless-stopped
    env_file: *env_file
    ports:
      - "${REDIS_PORT:-6379}:6379"  # 使用不同端口避免冲突
    volumes:
      - ./docker/data/redis:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_change_me}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - share-network

  share-backend:
    build:
      dockerfile: backend/Dockerfile
    container_name: share-my-status-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_DSN: "host=postgres user=${POSTGRES_USER:-status_sharing} password=${POSTGRES_PASSWORD:-postgres_password_change_me} dbname=${POSTGRES_DB:-status-sharing} port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - ./backend/.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - share-network

  share-web:
    build:
      dockerfile: frontend/Dockerfile
    container_name: share-my-status-web
    restart: always
    ports:
      - "${WEB_LISTEN_PORT:-8888}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # Main nginx config
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro  # Proxy config
    depends_on:
      - share-backend
    networks:
      - share-network

networks:
  share-network:
    driver: bridge
    name: share-my-status-network
