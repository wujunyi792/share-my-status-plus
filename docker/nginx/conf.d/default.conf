server {
    listen 80;
    server_name _;

    # Static resources
    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index  index.html index.htm;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        etag on;
        if_modified_since exact;
        add_header Cache-Control "no-cache";
        add_header Cache-Control "public, max-age=3600";
    }

    # Status API endpoint
    location /api/status/v1 {
        proxy_pass http://share-backend:8080;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSL/TLS settings
        proxy_ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
    }

    # Link handler endpoint
    location /link {
        proxy_pass http://share-backend:8080;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint for status sharing
    location ^~ /api/v1/ws {
        proxy_pass http://share-backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # General API proxy (fallback for other API routes)
    location ~ ^/(api|v[1])/ {
        proxy_pass http://share-backend:8080;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSL/TLS settings
        proxy_ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
    }
}