replicaCount: 1
revisionHistoryLimit: 10

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

release:
  backendVersion: "1.0.6-4"
  frontendVersion: "1.0.5-2"

serviceAccount:
  create: true
  annotations: {}
  name: ""

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/wujunyi792/share-my-status-backend
    tag: ""
    pullPolicy: IfNotPresent
  podAnnotations: {}
  podLabels: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  env: {}
  extraEnvFrom: []
  extraEnv: []
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/wujunyi792/share-my-status-frontend
    tag: ""
    pullPolicy: IfNotPresent
  podAnnotations: {}
  podLabels: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  nginx:
    defaultConf: ""
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: status.example.com
      backendPaths:
        - /api/v1/ws
        - /link
        - /api
        - /v1
        - /s
      frontendPaths:
        - /
  tls: []

postgresql:
  enabled: false
  auth:
    database: status-sharing
    username: status_sharing
    password: postgres_password_change_me
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: true
    password: redis_password_change_me
  master:
    persistence:
      enabled: true
      size: 4Gi
