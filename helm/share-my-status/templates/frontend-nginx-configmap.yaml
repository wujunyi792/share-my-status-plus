apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "share-my-status.frontend.fullname" . }}-nginx
  labels:
    {{- include "share-my-status.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    {{- if .Values.frontend.nginx.defaultConf }}
    {{- .Values.frontend.nginx.defaultConf | nindent 4 }}
    {{- else }}
    server {
        listen 80;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;

            etag on;
            if_modified_since exact;
            add_header Cache-Control "public, max-age=3600";
        }

        location /api/status/v1 {
            proxy_pass http://{{ include "share-my-status.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /link {
            proxy_pass http://{{ include "share-my-status.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /s/ {
            proxy_pass http://{{ include "share-my-status.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/ws {
            proxy_pass http://{{ include "share-my-status.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location ~ ^/(api|v[1])/ {
            proxy_pass http://{{ include "share-my-status.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    {{- end }}
