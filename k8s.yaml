apiVersion: v1
kind: Namespace
metadata:
  name: share-my-status
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: share-my-status-config
  namespace: share-my-status
data:
  # 应用配置
  APP_NAME: "share-my-status"
  HTTP_PORT: "8080"
  DEBUG: "false"
  DEFAULT_TZ: "Asia/Shanghai"
  REDIRECT_DEFAULT_TARGET: "http://localhost:3000/s/{SharingKey}"

  # 数据库连接串与连接池配置
  DB_DSN: "share_user:share_password_change_me@tcp(mysql:3306)/share_my_status?charset=utf8mb4&parseTime=True&loc=Local"
  DB_MAX_OPEN_CONNS: "20"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "1800"

  # Redis 配置
  REDIS_URL: "redis://redis:6379"
  REDIS_PASSWORD: "redis_password_change_me"
  REDIS_DB: "0"

  # 飞书配置
  FEISHU_APP_ID: "feishu_app_id_change_me"
  FEISHU_APP_SECRET: "feishu_app_secret_change_me"

  # 日志配置
  LOG_LEVEL: "debug"
  LOG_FORMAT: "json"

  # 旧版兼容性配置
  LEGACY_CRYPTO_KEY: "legacy_crypto_key_change_me"
  LEGACY_CRYPTO_IV: "legacy_crypto_iv_change_me"
  LEGACY_DEFAULT_JUMP_LINK: "https://example.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: share-my-status-deployment
  namespace: share-my-status
  labels:
    app: share-my-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: share-my-status-app
  template:
    metadata:
      labels:
        app: share-my-status-app
    spec:
      containers:
        - name: share-my-status-container
          image: wujunyi792/share-my-status-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: share-my-status-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: share-my-status-svc
  namespace: share-my-status
  labels:
    app: share-my-status-svc
    service: share-my-status-svc
spec:
  ports:
    - port: 8080
      name: http
      protocol: TCP
  selector:
    app: share-my-status-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: share-my-status-ingress
  namespace: share-my-status
spec:
  ingressClassName: higress
  tls:
    - secretName: share-my-status-cert
      hosts:
        - lark.mjclouds.com
        - status-sharing.mjclouds.com
  rules:
    - host: lark.mjclouds.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: share-my-status-svc
                port:
                  number: 8080
    - host: status-sharing.mjclouds.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: share-my-status-svc
                port:
                  number: 8080
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: share-my-status-tls
  namespace: share-my-status
spec:
  # The secretName will store certificate content
  secretName: share-my-status-cert
  dnsNames:
    - "lark.mjclouds.com"
    - "status-sharing.mjclouds.com"
  issuerRef:
    name: mjclouds-com
    kind: ClusterIssuer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: share-my-status
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_DATABASE
              value: "share_my_status"
            - name: MYSQL_USER
              value: "share_user"
            - name: MYSQL_PASSWORD
              value: "share_password_change_me"
            - name: MYSQL_ROOT_PASSWORD
              value: "root_password_change_me"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: share-my-status
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: share-my-status
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args: ["exec redis-server --appendonly yes --requirepass \"redis_password_change_me\""]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: share-my-status
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379