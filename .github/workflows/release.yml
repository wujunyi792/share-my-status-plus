name: Release and Docker Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build_backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        run: |
          git fetch origin main
          if git branch --contains $GITHUB_SHA origin/main; then
            echo "on_main=true" >> $GITHUB_ENV
          else
            echo "on_main=false" >> $GITHUB_ENV
            echo "Tag commit not on main; skipping." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set up Docker Buildx
        if: env.on_main == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: env.on_main == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        if: env.on_main == 'true'
        uses: docker/build-push-action@v5
        with:
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/share-my-status-backend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/share-my-status-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        run: |
          git fetch origin main
          if git branch --contains $GITHUB_SHA origin/main; then
            echo "on_main=true" >> $GITHUB_ENV
          else
            echo "on_main=false" >> $GITHUB_ENV
            echo "Tag commit not on main; skipping." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set up Docker Buildx
        if: env.on_main == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: env.on_main == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        if: env.on_main == 'true'
        uses: docker/build-push-action@v5
        with:
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/share-my-status-frontend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/share-my-status-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build_backend
      - build_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        run: |
          git fetch origin main
          if git branch --contains $GITHUB_SHA origin/main; then
            echo "on_main=true" >> $GITHUB_ENV
          else
            echo "on_main=false" >> $GITHUB_ENV
            echo "Tag commit not on main; skipping release." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create Release
        if: env.on_main == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}