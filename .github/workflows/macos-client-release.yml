name: Manual macOS Client Build, Sign, Notarize & Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-client-release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  APP_NAME: "Share My Status"
  PROJECT: desktop/macos/share-my-status-client.xcodeproj
  SCHEME: share-my-status-client
  SPARKLE_VERSION: "2.9.2"
  MIN_SYSTEM_VERSION: "13.5"

jobs:
  build_macos_client:
    name: Build, Sign, Notarize & Upload
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: build number is the commit count

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install create-dmg
        run: brew install create-dmg

      # ---------------------------------------------------------------------
      # Version + monotonic build number
      # ---------------------------------------------------------------------
      - name: Compute version and build number
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 'MARKETING_VERSION = ' "$PROJECT/project.pbxproj" | sed 's/.*= //; s/;.*//' | tr -d ' ')
          # Monotonically increasing build number, required so Sparkle can
          # tell newer builds apart (CFBundleVersion comparison).
          BUILD_NUMBER=$(git rev-list --count HEAD)
          TAG_NAME="desktop-macos-v${VERSION}-${BUILD_NUMBER}"
          ARTIFACT_BASE="share-my-status-client-macos-v${VERSION}-${BUILD_NUMBER}"
          {
            echo "VERSION=$VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "TAG_NAME=$TAG_NAME"
            echo "ARTIFACT_BASE=$ARTIFACT_BASE"
          } >> "$GITHUB_OUTPUT"
          echo "Version=$VERSION Build=$BUILD_NUMBER Tag=$TAG_NAME"

      # ---------------------------------------------------------------------
      # Import the Developer ID Application certificate into a temp keychain
      # ---------------------------------------------------------------------
      - name: Import signing certificate
        id: keychain
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Make the temp keychain searchable alongside the existing ones.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')

          # Discover the Developer ID Application identity + its Team ID.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"$/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          TEAM_ID=$(echo "$IDENTITY" | sed -nE 's/.*\(([A-Z0-9]+)\)$/\1/p')
          echo "Identity: $IDENTITY"
          echo "Team ID:  $TEAM_ID"
          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "SIGN_IDENTITY=$IDENTITY"
            echo "TEAM_ID=$TEAM_ID"
          } >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # Archive + export a Developer ID signed, hardened-runtime app
      # ---------------------------------------------------------------------
      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.BUILD_NUMBER }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ steps.keychain.outputs.TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.keychain.outputs.KEYCHAIN_PATH }}"

      - name: Export archive (Developer ID)
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${{ steps.keychain.outputs.TEAM_ID }}</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          APP_PATH="$RUNNER_TEMP/export/$APP_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Exported app not found at $APP_PATH"
            ls -R "$RUNNER_TEMP/export" || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Verify signature
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvv "$APP_PATH" 2>&1 | grep -E "Authority|TeamIdentifier|Runtime" || true

      # ---------------------------------------------------------------------
      # Notarize the .app, then staple it (offline first-launch works)
      # ---------------------------------------------------------------------
      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"

          APP_ZIP="$RUNNER_TEMP/app-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          xcrun notarytool submit "$APP_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      # ---------------------------------------------------------------------
      # Build the DMG (drag-to-Applications), sign it, notarize + staple
      # ---------------------------------------------------------------------
      - name: Create DMG
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"

          DMG_PATH="$RUNNER_TEMP/${{ steps.version.outputs.ARTIFACT_BASE }}.dmg"
          rm -f "$DMG_PATH"

          # Fancy drag-to-Applications layout. create-dmg can flake on the
          # AppleScript window styling in headless CI, so fall back to a plain
          # hdiutil DMG if the styled build does not produce a file.
          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 165 175 \
            --hide-extension "$APP_NAME.app" \
            --app-drop-link 495 175 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$STAGE" || true

          if [ ! -f "$DMG_PATH" ]; then
            echo "create-dmg did not produce a styled DMG; falling back to hdiutil."
            ln -s /Applications "$STAGE/Applications"
            hdiutil create -volname "$APP_NAME" -srcfolder "$STAGE" \
              -ov -format UDZO "$DMG_PATH"
          fi
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Sign DMG
        run: |
          set -euo pipefail
          codesign --force --sign "${{ steps.keychain.outputs.SIGN_IDENTITY }}" \
            --keychain "${{ steps.keychain.outputs.KEYCHAIN_PATH }}" \
            --timestamp "$DMG_PATH"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -vv "$DMG_PATH" || true

      # ---------------------------------------------------------------------
      # Sign the DMG with Sparkle's EdDSA key and generate the appcast
      # ---------------------------------------------------------------------
      - name: Generate signed appcast
        id: appcast
        timeout-minutes: 5
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Fetch Sparkle's CLI tools (sign_update).
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          BIN="$RUNNER_TEMP/sparkle/bin"

          # Sign the DMG by reading the EdDSA key from a FILE, never the Keychain.
          # generate_keys/keychain access hangs forever on headless CI (no GUI to
          # approve the keychain prompt). --ed-key-file avoids the Keychain entirely.
          # Prints: sparkle:edSignature="..." length="..."
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed_priv"
          SIG_ATTRS=$("$BIN/sign_update" --ed-key-file "$RUNNER_TEMP/sparkle_ed_priv" "$DMG_PATH")
          echo "Signature attrs: $SIG_ATTRS"

          ARTIFACT="${{ steps.version.outputs.ARTIFACT_BASE }}.dmg"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.TAG_NAME }}/${ARTIFACT}"
          # RFC 822 date MUST be in English for Sparkle to parse it; lock the locale.
          PUB_DATE=$(LC_ALL=C date -u "+%a, %d %b %Y %H:%M:%S +0000")

          APPCAST="$RUNNER_TEMP/appcast.xml"
          cat > "$APPCAST" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>${APP_NAME}</title>
              <link>https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml</link>
              <description>Most recent updates to ${APP_NAME}.</description>
              <language>zh</language>
              <item>
                <title>Version ${{ steps.version.outputs.VERSION }} (${{ steps.version.outputs.BUILD_NUMBER }})</title>
                <link>https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG_NAME }}</link>
                <sparkle:version>${{ steps.version.outputs.BUILD_NUMBER }}</sparkle:version>
                <sparkle:shortVersionString>${{ steps.version.outputs.VERSION }}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>${MIN_SYSTEM_VERSION}</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure url="${DMG_URL}" type="application/x-apple-diskimage" ${SIG_ATTRS} />
              </item>
            </channel>
          </rss>
          EOF

          echo "----- appcast.xml -----"
          cat "$APPCAST"
          echo "APPCAST_PATH=$APPCAST" >> "$GITHUB_ENV"

      - name: Checksums
        run: |
          set -euo pipefail
          shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"
          cat "$DMG_PATH.sha256"

      # ---------------------------------------------------------------------
      # Publish the release with the DMG, its checksum, and the appcast
      # ---------------------------------------------------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: macOS Client ${{ steps.version.outputs.VERSION }} (${{ steps.version.outputs.BUILD_NUMBER }})
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.DMG_PATH }}.sha256
            ${{ env.APPCAST_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "${{ steps.keychain.outputs.KEYCHAIN_PATH }}" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/sparkle_ed_priv" || true
