name: share-my-status-dev

x-env-file: &env_file
  - .env.dev

services:
  # MySQL Database for Development - 简化配置
  mysql-dev:
    image: mysql:latest
    container_name: share-my-status-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-share_my_status_dev}
      MYSQL_USER: ${MYSQL_USER:-dev_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev123}
      MYSQL_CHARSET: utf8mb4
    env_file: *env_file
    ports:
      - "${MYSQL_PORT:-3307}:3306"  # 使用不同端口避免冲突
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dev-network

  # Redis Cache for Development
  redis-dev:
    image: redis:7.4-alpine
    container_name: share-my-status-redis-dev
    restart: unless-stopped
    env_file: *env_file
    ports:
      - "${REDIS_PORT:-6380}:6379"  # 使用不同端口避免冲突
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev_password_123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password_123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - dev-network



volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  dev-network:
    driver: bridge
    name: share-my-status-dev-network